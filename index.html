<!DOCTYPE html>
<html lang="en">
<head>

            <section class="column">
                <h2 class="section-title">COMING SOON  -  PRÓXIMAMENTE</h2>
                <div id="coming-soon-container" class="menu-board"></div>
            </section>

    </div>

    <script src="script.js"></script>
